<div class="landingpage-container">

  <button class="fab-contact" aria-label="Ir para contato" (click)="scrollTo('contact')">
    <lucide-icon [img]="icons.Mail" [size]="20"></lucide-icon>
  </button>

  <section id="home" class="section">
    <app-hero-section (navigateTo)="scrollTo($event)"></app-hero-section>
  </section>

  <section id="about" class="section">
    <app-about (navigateTo)="scrollTo($event)"></app-about>
  </section>

  <section id="about-founder" class="section">
    <app-founder></app-founder>
  </section>

  <section id="projects" class="section projects-section">
    <app-projects></app-projects>
  </section>

  <section id="questions" class="section">
    <app-questions></app-questions>
  </section>

  <section id="contact" class="section">
    <app-contact></app-contact>
  </section>
</div>
