<div class="hero-container">
  <h1 class="hero-title">
    Um laboratório onde<br>
    ideias viram <span class="highlight">sistemas.</span>
  </h1>

  <p class="hero-sub">
    Projetos reais de software — exploráveis, acessíveis<br>
    e construídos pra resolver problemas de verdade.
  </p>

  <div class="hero-actions">
    <app-button-component href="#contact" variant="outline" [showIcon]="false">
      Entrar no Lab
    </app-button-component>

    <app-button-component href="/projects" variant="white" >
      <span>Ver projetos</span>
    </app-button-component>
  </div>

  <div class="scroll-hint" [class.hidden]="scrolled">
    <span class="scroll-line"></span>
  </div>
</div>
