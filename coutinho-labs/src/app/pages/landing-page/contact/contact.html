<div class="contact-container">
  <p>Vamos construir!</p>

  <h2>Tem uma ideia? O lab está aberto.</h2>
  <p>Se quiser colaborar, contratar ou só trocar uma ideia sobre o que está sendo construído aqui — entre em contato por meio do formulário abaixo.</p>

  <div class="form-container">
    <form action="">
      <input type="text" placeholder="Seu nome" required>
      <input type="email" placeholder="Seu email" required>
      <textarea placeholder="Sua mensagem" required></textarea>

      <app-button-component variant="lavanda">
        Enviar
      </app-button-component>
    </form>
  </div>
</div>
