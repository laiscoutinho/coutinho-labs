<div class="contact-container">

  <div class="contact-info">
    <p class="label">Vamos construir?</p>
    <h2>Tem uma ideia, projeto ou problema pra resolver?</h2>
    <p class="subtitle">Posso ajudar a transformar isso em um sistema funcional. Se quiser colaborar, contratar ou entender melhor como trabalho — é só mandar uma mensagem.</p>

    <div class="contact-hints">
      <div class="hint">
        <lucide-icon name="items.zap" [size]="16" />
        <span>Resposta em até 24h</span>
      </div>
      <div class="hint">
        <lucide-icon name="items.lock" [size]="16" />
        <span>Suas informações são privadas</span>
      </div>
    </div>
  </div>

  <div class="form-container">
    <div class="form-group">
      <label>Nome</label>
      <input type="text" placeholder="Como posso te chamar?" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="seu@email.com" />
    </div>

    <div class="form-group">
      <label>Mensagem</label>
      <textarea rows="5" placeholder="Conta um pouco sobre o que você tem em mente..."></textarea>
    </div>

    <app-button-component variant="lavanda">
      Iniciar projeto
    </app-button-component>
  </div>

</div>
