<section class="projects-section" aria-labelledby="projects-heading">

  <header class="projects-header">
    <span class="projects-label" aria-hidden="true">Projetos</span>
    <h2 id="projects-heading">O que saiu do lab.</h2>
    <p>Cada projeto é um experimento real. Use, explore, teste.</p>
  </header>

  <div class="bento-grid" role="list" aria-label="Projetos em destaque">

    <!-- ── CARD PRINCIPAL ──────────────────────────────────────────────────── -->
    <div
      class="bento-cell bento-cell--featured"
      role="listitem"
      #card
      data-tilt-x="-4"
      data-tilt-y="6">
      <app-project-card-component
        [project]="isLoading ? undefined : showcaseProjects[0]"
        [loading]="isLoading" />
    </div>

    <!-- ── COLUNA LATERAL ──────────────────────────────────────────────────── -->
    <div class="bento-side">

      <div
        class="bento-cell bento-cell--secondary"
        role="listitem"
        #card
        data-tilt-x="3"
        data-tilt-y="-5">
        <app-project-card-component
          [project]="isLoading ? undefined : showcaseProjects[1]"
          [loading]="isLoading" />
      </div>

      <div
        class="bento-cell bento-cell--secondary"
        role="listitem"
        #card
        data-tilt-x="-2"
        data-tilt-y="5">
        <app-project-card-component
          [project]="isLoading ? undefined : showcaseProjects[2]"
          [loading]="isLoading" />
      </div>

    </div>
  </div>

  <!-- ── BOTÃO VER MAIS ──────────────────────────────────────────────────────── -->
  @if (hiddenCount > 0) {
    <div class="projects-footer">
      <app-button-component
        href="/projects"
        variant="white"
        [showIcon]="false"
        [attr.aria-label]="'Ver todos os ' + allProjects.length + ' projetos'">

        <span class="btn-explore__text">explorar todos os projetos</span>

        <span class="btn-explore__count" aria-hidden="true">+{{ hiddenCount }}</span>

        <lucide-icon
          [img]="icons.ArrowRight"
          [size]="16"
          class="btn-explore__arrow"
          aria-hidden="true" />

      </app-button-component>
    </div>
  }

</section>
