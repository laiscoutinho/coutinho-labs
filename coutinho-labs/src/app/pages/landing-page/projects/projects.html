<div class="about-container">
  <div class="projects-info">
    <p>Projetos</p>
    <h2>O que saiu do lab.</h2>
    <p>Cada projeto é um experimento real. Use, explore, teste.</p>
  </div>

  <div class="projects-wrapper">
    <div class="projects-scroll" #scrollRef>
      @for (project of projects; track project.id; let i = $index) {
        <div class="project-card"
            [class.active]="activeProjectIndex === i"
            [attr.data-cursor]="activeProjectIndex === i ? 'card' : null">
          <img class="card-image" [src]="project.imageUrl" [alt]="project.title" />
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          @if (project.link) {
            <app-button-link-component text="Ver projeto" [href]="project.link" [external]="true" />
          }
        </div>
      }
    </div>
  </div>

  <div class="controls">
    <button class="nav-btn" (click)="prev()" [class.disabled]="isFirst">
      <lucide-icon name="arrow-left" [size]="14" />
    </button>

    <div class="dots">
      @for (project of projects; track project.id; let i = $index) {
        <span class="dot" [class.active]="activeProjectIndex === i" (click)="goToIndex(i)"></span>
      }
    </div>

    <button class="nav-btn" (click)="next()" [class.disabled]="isLast">
      <lucide-icon name="arrow-right" [size]="14" />
    </button>
  </div>
</div>
